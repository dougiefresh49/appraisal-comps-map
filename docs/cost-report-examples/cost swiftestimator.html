      /* ============================================================

      }

        -ms-text-size-adjust: 100%;
        -webkit-text-size-adjust: 100%;
      }

        background: #eeeeee;
        padding-top: 16px;
        color: #222;
        cursor: auto;
        font-family: Lato, 'Helvetica Neue', Helvetica, Arial, sans-serif;
        font-size: 12pt; /* Set default size for all text - avoids variations based on User Settings. */

      A {
        text-decoration: none;
        color: #006699;
        /* Remove the gray background color from active links in IE 10. */
        background-color: transparent;
        font-size: inherit;
        white-space: nowrap;
      }

      A:hover {
        cursor: pointer;
        color: #17a2e3;
      }

      A:active,
      A:hover {
        /* For improved readability */

      }

      /* Headings */
      H1,
      H2,
      H3,
      H4,
      H5,
      H6 {
        font-weight: 400;
        line-height: 1em;
      }

      /**
 * Address variable `h1` font-size and margin within `section` and `article`

 */
      H1 {
        font-family: 'Lato';
        font-weight: bold !important;
        color: #2d2d2d;
        margin: 0.67em 0;
      }

      H2 {
        font-family: 'Lato';
        font-weight: bold;
        font-size: 16pt;
        color: #2d2d2d;
        margin: 0.67em 0;
      }

      /* Text */

      B {
        color: black;
        font-size: 10pt;
      }

      /* Address style set to `bolder` in Firefox 4+, Safari, and Chrome. */
      B,
      STRONG {
        font-weight: bold;
      }

      NOBR {
        color: #2d2d2d;
        font-size: 10pt;
      }

      LABEL {
        font-family: Lato;
        font-size: 12pt;
        color: #2d2d2d;
      }

      P {
        font-family: 'Lato';
        color: #626a6d;
        font-size: 12pt;
      }

      PRE {
        overflow: auto; /* Contain overflow in all browsers. */
      }

      /* Address odd `em`-unit font size rendering in all browsers.  */
      CODE,
      KBD,
      PRE,
      SAMP {
        font-family: monospace, monospace;
        font-size: 1em;
      }

      /* Data Entry */
      BUTTON,
      .button {
        -webkit-appearance: none;
        -moz-appearance: none;
        background-color: #e57110;
        border-radius: 4px;
        -moz-border-radius: 4px;
        -webkit-border-radius: 4px;
        color: #ffffff;
        cursor: pointer;
        display: inline-block;
        height: 45px;
        width: 100%;
        line-height: 45px;
        font-size: 10pt;
        font-weight: 600;
        letter-spacing: 0.02em;
        margin: 0;
        /* Address `overflow` set to `hidden` in IE 8/9/10/11. */
        overflow: visible;
        padding: 0 20px 0 20px;
        position: relative;
        text-align: center;
        text-decoration: none;
        text-transform: uppercase;
        transition: background-color 300ms ease-out;
      }

      INPUT {
        border: 1px solid #dddddd;
        /* Address Firefox 4+ setting `line-height` on `input` using `!important` in the UA stylesheet. */
        line-height: normal;
        outline: 0;
        padding: 0;
        -webkit-transition: background-color 0.3s;
        transition: background-color 0.3s;
      }

      /* Note, on pages tied to IE7 format, entries that use [type="text"], etc. will not be visible in Internet Explorer. */
      INPUT[type='text'],
      INPUT[type='password'] {
        color: #626a6d;
        font-size: 12pt;
        padding: 0 15px;
        border-radius: 4px;
        -moz-border-radius: 4px;
        -webkit-border-radius: 4px;
        height: 36px;
      }

      INPUT[type='text']:focus {
        color: #2d2d2d;
      }

      /**
 * It's recommended that you don't attempt to style these elements.
 * Firefox's implementation doesn't respect box-sizing, padding, or width.

      INPUT[type='radio'] {
        box-sizing: border-box; /* 1 */
        padding: 0; /* 2 */
      }

      /**
 * 1. Address `appearance` set to `searchfield` in Safari and Chrome.
 * 2. Address `box-sizing` set to `border-box` in Safari and Chrome.
 */
      INPUT[type='search'] {
        -webkit-appearance: textfield; /* 1 */
        box-sizing: content-box; /* 2 */
      }
      /**
 * Remove inner padding and search cancel button in Safari and Chrome on OS X.

 * padding (and `textfield` appearance).
 */

      INPUT[type='search']::-webkit-search-decoration {
        -webkit-appearance: none;
      }

      /**
 * Fix the cursor style for Chrome's increment/decrement buttons. For certain

 * decrement button to change from `default` to `text`.
 */

      INPUT[type='number']::-webkit-outer-spin-button {
        height: auto;
      }

      SELECT {
        width: 100%;
        border: 1px solid #dddddd;
        color: #626a6d;
        font-size: 12pt;
        padding: 0 2px;
        border-radius: 4px;
        -moz-border-radius: 4px;
        -webkit-border-radius: 4px;
        height: 24px;
        text-transform: none;
        z-index: 0;
      }

      TEXTAREA {
        height: auto;
        min-height: 50px;
        overflow: auto; /* Remove default vertical scrollbar in IE 8/9/10/11. */
      }

      /**
 * Known limitation: by default, Chrome and Safari on OS X allow very limited
 * styling of `select`, unless a `border` property is set.
 *
 *
 * 1. Correct color not being inherited.
 *    Known issue: affects color of disabled elements.
 * 2. Correct font properties not being inherited.
 * 3. Address margins set differently in Firefox 4+, Safari, and Chrome.
 */

      INPUT,
      OPTGROUP,
      SELECT,
      TEXTAREA {
        color: inherit; /* 1 */
        font: inherit; /* 2 */
        margin: 0; /* 3 */
      }

      /**

 * All other form control elements do not inherit `text-transform` values.

 */

      INPUT[type='reset'],
      INPUT[type='submit'] {

      }

      INPUT[disabled] {
        cursor: default;
        background-color: #eeeeee;
      }

      /* Remove inner padding and border in Firefox 4+. */
      BUTTON::-moz-focus-inner,
      INPUT::-moz-focus-inner {
        border: 0;
        padding: 0;
      }

      /* These next three are not used by SE7. 
FIELDSET {
	border: 1px solid #c0c0c0;
	margin: 0 2px;
	padding: 0.35em 0.625em 0.75em;
}

	border: 0;    /* Correct `color` not being inherited in IE 8/9/10/11. *

      /* Address differences between Firefox and other browsers. */
      HR {

      TABLE {

      TD,
      TH {
        padding: 0;

      }

      }

      /* #region HTML5 display definitions */

      figcaption,
      figure,
      footer,
      header,
      hgroup,

      menu,

      /* #region CoreLogic Colors */
      /* CL Style Guide: Light blue #62B5E5 , Warm gray #8C8279, Warm Gray #6E6259, Light Gray #F1F0EB */
      /* CL Design Lab: Blue #006699, Orange #F47D1C, Dark Grey #2D2D2D, Medium Grey #626A6D, Light Grey #EEEEEE, Lightest Grey #F3F5F5, Alert Red #DB421F , Alert Green #6A9B16 */

      .cl-color-blue {
        color: #006699;
      }

      .cl-color-orange {
        color: #f47d1c;
      }

      .cl-color-darkgrey {
        color: #2d2d2d;
      }

      .cl-color-mediumgrey {
        color: #626a6d;
      }

      .cl-color-lightgrey {
        color: #eeeeee;
      }

      .cl-color-lightestgrey {
        color: #f3f5f5;
      }

      .cl-color-green {
        color: #6a9b16;
      }

      .cl-color-red {
        color: #db421f;
      }

      /* #endregion CoreLogic Colors */

      /* #region Global Classes - apply to multiple element types */
      /* Note, many of these are not really global and should be moved.  Others are not in use. */

      .linkButtons A {
        display: inline;
        margin-left: 20px;
        margin-right: 20px;
        padding-top: 8px;
        padding-bottom: 8px;
      }

      .linkButtons A:hover {
        color: white; /* Do not show blue text. */
      }

      .med_Width {
        height: 30px;
        line-height: 30px;
        width: 130px;
        margin: 0px 20px;
      }

      .wide_Width {
        width: 325px;
      }

      .clearfix {
        *zoom: 1;
      }

      .clearfix:before,
      .clearfix:after {
        content: ' ';
        display: table;
      }

      .clearfix:after {
        clear: both;
      }

      /* Layout  */
      .mainWindow {
        width: 900px !important; /* used to be 723 */
      }

      .mainFooter {
        width: 900px; /* Should be larger than mainWindow. */
        margin: 16px;
        text-align: center;
        font-size: 12pt;
      }

      /* These "cl-" classes currently support the login page only. */
      .cl-inner-block {
        background: #fff;
        max-width: 1050px;
        padding: 30px 60px 10px 60px;
        margin-bottom: 40px;
        overflow: auto;
        border-radius: 4px;
        -moz-border-radius: 4px;
        -webkit-border-radius: 4px;
        -webkit-box-shadow: 0px 0px 11px 2px rgba(0, 0, 0, 0.07);
        -moz-box-shadow: 0px 0px 11px 2px rgba(0, 0, 0, 0.07);
        box-shadow: 0px 0px 11px 2px rgba(0, 0, 0, 0.07);
      }

      .cl-app-logo {
        margin: 0 0 25px 0;
        font-size: 22pt;
        line-height: 36px;
      }

      .cl-row {
        margin: 0 auto;
        max-width: 100%;
        width: 100%;
      }

      .cl-row:before,
      .cl-row:after {
        content: ' ';
        display: table;
      }

      .cl-row:after {
        clear: both;
      }

      .cl-row .cl-row {
        margin: 0 -0.9375em;
        max-width: none;
        width: auto;
      }

      .cl-column,
      .cl-columns {
        position: relative;
        padding-left: 10px;
        padding-right: 10px;
        width: 100%;
        float: left;
      }

      .cl-column + .cl-column:last-child,
      .cl-columns + .cl-columns:last-child {
        float: right;
      }

      .cl-column + .cl-column.end,
      .cl-columns + .cl-columns.end {
        float: left;
      }

      .cl-offset-1 {
        padding-left: 8.33333% !important;
      }

      .cl-left-block {
        max-width: 400px;
      }

      .cl-right-block {
        /* Placeholder */
      }

      .cl-error {
        color: red;
        white-space: pre-line;
      }

      .cl-image {
        position: absolute;
        top: 40px;
        right: -15px;
        background: transparent !important;
        border-radius: 4px;
        -moz-border-radius: 4px;
        -webkit-border-radius: 4px;
        overflow: hidden;
        -webkit-box-shadow: 0px 6px 21px 5px rgba(0, 0, 0, 0.15);
        -moz-box-shadow: 0px 6px 21px 5px rgba(0, 0, 0, 0.15);
        box-shadow: 0px 6px 21px 5px rgba(0, 0, 0, 0.15);
      }

      .cl-image IMG {
        background: transparent !important;
      }

      /* Classes for grids */
      .clsGrid {
        border-right: thin inset;
        border-top: thin inset;
        overflow: scroll;
        border-left: thin inset;
        width: 100%;
        border-bottom: thin inset;
      }

      .clsGridRow {
        border: #626a6d 1px solid;
      }

      .clsGridRowHeader {
        background-color: #62b5e5;
      }

      .clsGridRowHeader TD,
      .clsGridRowHeader TH,
      .clsGridRowHeader A {
        color: black !important;
        font-weight: bold !important;
      }

      .clsGridRowEven {
        background-color: #f3f5f5;
      }

      .clsGridRowOdd {
        background-color: #dddddd;
      }

      .clsGridRowFooter {
        background-color: #62b5e5;
      }

      .clsGridRowHover TD {
        cursor: hand;
        background-color: #bfdcff; /* TO DO: Change legacy color. */
      }

      .clsGridRowHighlight TD {
        cursor: hand;
        color: white;
        background-color: #1b57a6; /* TO DO: Change legacy color. */
      }

      .clsGridRowHeader TD,
      .clsGridRowHeader TH,
      .clsGridRowEven TD,
      .clsGridRowOdd TD,
      .clsGridRowHover TD,
      .clsGridRowHighlight TD {
        padding: 2px;
        text-align: left;
      }

      /* For the Forgotten Password page. */
      .cl-validator {
        color: #db421f !important;
      }

      .innerWindow {
        background-color: white;
      }

      .popupBorder {
        border: 2px solid #006699;
      }

      /* #endregion Global Classes */

      /* #region Element-specific Style Classes */
      DIV.sampleHeader {
        font-size: 12pt;
        font-weight: bold;
        height: 30px;
        vertical-align: bottom;
        text-align: left;
        background-color: white;
        position: relative;
        top: 6px;
        left: 20px;
      }

      FIELDSET.tutorial {
        background-color: white;
        height: 90%;
        width: 90%;
        border: 2px solid #006699;
        /* margin-top: 5%; removed because it wasn't working in IE. */
        margin-left: 5%;
        position: relative;
      }

      FIELDSET.tutorial LEGEND {
        background-color: white;
        font-weight: bold;
        font-size: 12pt;
        position: absolute;
        top: -1em;
        left: 1em;
      }

      SPAN.spacer {
        margin-left: 8px;
        margin-right: 8px;
      }

      SPAN.required {
        font-weight: bold;
        color: red; /* Matches cl-error */
        font-size: 13pt;
        line-height: 13px;
      }

      SPAN.noM {
        margin-right: 0px !important;
      }

      TD.docList {
        font-size: 12pt;
      }

      TD.docList P {
        margin-top: 100px;
      }

      TD.docList A {
        color: #006699; /* formerly blue, #0000FF; */
        font-size: 12pt;
        font-weight: bold;
        margin-left: 60px;
        text-decoration: underline;
      }

      TD.docList SPAN {
        font-size: 13pt;
        font-weight: bold;
        margin-left: 30px;
      }

      /* #endregion Element-specific Style Classes */

      #cl-header {
        padding: 45px 0 45px;
        text-align: center;
      }

        margin: 0 auto;
        display: block;
        width: 234px;
        height: 67px;
      }

        margin: 0 5px;
      }

        clear: both;
      }

        display: inline-block;

        padding-top: 25px;
        padding-bottom: 30px;
        padding-right: 0px;
      }

      #cl-header-left {
        float: left;
        padding-left: 25px;
      }

      #cl-header-right {
        float: right;
        padding-left: 0px;
      }

      #cl_header_logo {
        height: 67px;
        margin-top: 5px;
      }

      #cl-header-se-logo {
        width: 380px;
        height: 72px;
      }

      #cl-menu-loggedin {
        background-color: #006699;
        color: white;
        text-transform: uppercase;
        font-size: 12pt;
        height: 30px;
        line-height: 30px;
        margin: 0px;
      }

      #cl-menu-loggedin a {
        color: white;
      }

      #cl-menu-loggedin:after {
        clear: both;
      }

      #cl-menu-loggedin li {

        padding: 1px 20px;
        margin: 0px;
      }

        color: white;
        text-transform: uppercase;
        font-size: 13pt;
        height: 30px;
        line-height: 30px;
      }

        color: white;
      }

        float: right;
      }

      }

        color: white;
      }

        margin: 0;
      }

      #cl-menu-signup li:nth-child(1) {

      }

      }
